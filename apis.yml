name: Copernicus Marine
description: >-
  The EU Copernicus Marine Environment Monitoring Service (CMEMS), operated by
  Mercator Ocean International, provides free and open access to authoritative
  information on the state of the global ocean and European regional seas. The
  service delivers ocean physical and biogeochemical data through multiple APIs
  covering temperature, salinity, sea level, currents, sea ice, and marine
  ecosystem variables from satellite observations, in situ measurements, and
  numerical model reanalysis and forecast products. Data can be accessed
  programmatically via the Copernicus Marine Toolbox (Python API and CLI), the
  OGC-compliant Web Map Tile Service (WMTS) for visualization, and the
  Catalogue Service for the Web (CSW) for product discovery. All services
  require a free Copernicus Marine account, except the CSW which is fully open,
  and there are no data volume quotas or download limits.
type: Index
image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
